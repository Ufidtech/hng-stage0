<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hng Stage0</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <article data-testid="test-todo-card" class="todo-card">
      <header class="todo-card-header">
        <h2 data-testid="test-todo-title" class="todo-card-title">
          FreeCodeCamp JS Certification
        </h2>

        <span data-testid="test-todo-priority" class="todo-card-priority"
          >Priority: High</span
        >
      </header>
      <p data-testid="test-todo-description" class="todo-card-description">
        Complete all the projects and challenges to earn the JavaScript
        Algorithms and Data Structures Certification.
      </p>
      <div class="todo-card-dates">
        <time
          data-testid="test-todo-due-date"
          class="todo-card-due-date"
          datetime="2026-12-31"
          >Due Feb 18, 2026</time
        >
        <time
          data-testid="test-todo-time-remaining"
          class="todo-card-time-remaining"
          >Due in 3 Days</time
        >
      </div>
      <ul data-testid="test-todo-tags" class="todo-tags" role="list">
        <li data-testid="test-todo-tag-work" class="todo-tag">Work</li>
        <li data-testid="test-todo-tag-urgent" class="todo-tag">Urgent</li>
      </ul>
      <footer class="todo-card-footer">
        <div class="todo-card-status-group">
          <input
            data-testid="test-todo-complete-toggle"
            type="checkbox"
            class="todo-card-complete-checkbox"
            id="test-todo-complete-toggle"
          />
          <label
            data-testid="test-todo-status"
            for="test-todo-complete-toggle"
            class="todo-card-complete-label"
            >In Progress</label
          >
        </div>

        <div class="todo-card-actions">
          <button
            data-testid="test-todo-edit-button"
            class="todo-card-edit-button"
          >
            Edit
          </button>
          <button
            data-testid="test-todo-delete-button"
            class="todo-card-delete-button"
          >
            Delete
          </button>
        </div>
      </footer>
    </article>
    <script src="script.js"></script>
  </body>
</html>
